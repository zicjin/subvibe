name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck -S warning scripts/*.sh bin/* install.sh tests/run-tests.sh
      - name: tests
        run: bash tests/run-tests.sh
